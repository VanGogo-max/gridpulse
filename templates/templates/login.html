{% extends "base.html" %}

{% block title %}Вход — GridPulse{% endblock %}

{% block content %}
    <section>
        <h1>🔐 Вход в акаунт</h1>
        
        <div class="card" style="max-width: 500px;">
            <form method="POST" action="{{ url_for('login') }}">
                <div>
                    <label for="email">📧 Имейл</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                
                <div>
                    <label for="password">🔒 Парола</label>
                    <input type="password" id="password" name="password" required placeholder="Въведете парола">
                </div>
                
                <button type="submit" class="btn" style="width: 100%; padding: 15px;">
                    Вход
                </button>
            </form>
            
            <p style="margin-top: 20px; text-align: center;">
                Нямате акаунт? <a href="{{ url_for('register') }}" style="color: #3498db;">Регистрирайте се</a>
            </p>
        </div>
    </section>
{% endblock %}
